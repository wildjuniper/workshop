source = ~/.config/hypr/theme.conf

monitor=DP-1, 2560x1440@300, 0x0, 1.25

exec-once = awww-daemon
exec-once = walker --gapplication-service

general {
    gaps_in = -2
    gaps_out = -2

    border_size = 4

    col.active_border = $active
    col.inactive_border = $inactive
}

decoration {
    dim_modal=false

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

input {
    follow_mouse = 1

    sensitivity = 0
}

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod,	    RETURN, exec,	    kitty
bind = $mainMod,	    D,      exec,       walker
bind = $mainMod,        L,      exec,       hyprshot -o ~/pictures/screenshots -m region

bind = $mainMod,        J,      layoutmsg,  togglesplit

bind = $mainMod SHIFT,  Q,      killactive,

bind = $mainMod SHIFT, L, exec, hyprlock

bindl = $mainMod SHIFT, M, exec, hyprctl dispatch exit
bindl = $mainMod SHIFT, S, exec, systemctl suspend
bindl = $mainMod SHIFT, B, exec, systemctl poweroff
bindl = $mainMod SHIFT, H, exec, systemctl hibernate

bind = $mainMod SHIFT, P, exec, env HYPRSHOT_DIR=$HOME/pictures/screenshots hyprshot -m region 
bind = $mainMod SHIFT, Y, exec, toggle-theme

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize active window
bind = $mainMod SHIFT, right, resizeactive, 50 0
bind = $mainMod SHIFT, left, resizeactive, -50 0
bind = $mainMod SHIFT, up, resizeactive, 0 -50
bind = $mainMod SHIFT, down, resizeactive, 0 50

# Swap windows
bind = $mainMod CTRL, left, movewindow, left
bind = $mainMod CTRL, right, movewindow, right
bind = $mainMod CTRL, up, movewindow, top
bind = $mainMod CTRL, down, movewindow, bottom

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

unbind = F11

windowrule {
    name=single-window
    match:workspace = w[t1]
    border_color = $inactive
}

windowrule {
    name = tag-app
    match:class = (org.shd.wiremix|org.shd.wg-tui|org.gnome.NautilusPreviewer|xdg-desktop-portal-gtk|org.gnome.Nautilus)
    tag = +floating-app
}

windowrule { 
    name = floating-app
    match:tag = floating-app
    float = on
    center = on
    size = 950 650
    stay_focused = on
    no_follow_mouse = on
    border_size = 4
    border_color = rgb(ff0000) rgb(ff0000)
}

windowrule {
    name= wg-tui
    match:tag = floating-app
    size = 950 850
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}


